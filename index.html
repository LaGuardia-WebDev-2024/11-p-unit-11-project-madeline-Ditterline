<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="boo1-button">Book #1</button>
    <button id="boo2-button">Book #2</button>
    <button id="boo3-button">Book #3</button>
    <h1>My Top 3 Books of <span>This Year</span></h1>
    <ol>
      <li>
        <h3 id="boo1">Book #1</h3>
        <p>More about this book.</p>
      </li>

      <li>
        <h3 id="boo2">Book #2</h3>
        <p>More about this book.</p>
      </li>

      <li>
        <h3 id="boo3">Book #3</h3>
        <p>More about this book</p>
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      // ======================== Button #1
      $("#boo1-button").click(function () {
        $("#boo1").css("color", "purple");
      });

      // ======================== Button #2
      $("#boo2-button").click(function () {
        $("#boo2").css("color", "blue");
      });

      // ======================== Button #3
      $("#boo3-button").click(function () {
        $("#boo3").css("color", "green");
        $("#boo3").text("Coding Parties! 🎉");
      });


    </script>
  </body>
</html>
